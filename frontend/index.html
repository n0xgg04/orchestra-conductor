<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orchestra Conductor</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111; color: #eee; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; color: #00d4ff; }
    .container { max-width: 900px; margin: 0 auto; }
    .card { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
    .card h2 { font-size: 18px; margin-bottom: 15px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 15px; }
    button { background: #00d4ff; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.8; }
    button:disabled { background: #555; color: #888; cursor: not-allowed; }
    button.secondary { background: #ff4757; color: #fff; }
    button.warning { background: #ffa502; color: #000; }
    .slider-container { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
    input[type="range"] { flex: 1; height: 8px; }
    .time-display { font-family: monospace; font-size: 20px; min-width: 80px; text-align: center; color: #00d4ff; }
    textarea { width: 100%; height: 200px; background: #222; color: #0f0; border: 1px solid #444; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; resize: vertical; }
    .status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .inst-card { background: #222; padding: 15px; border-radius: 8px; border-left: 4px solid #555; }
    .inst-card.online { border-left-color: #2ed573; }
    .inst-card.offline { border-left-color: #ff4757; }
    .inst-name { font-weight: bold; margin-bottom: 5px; }
    .inst-status { font-size: 13px; color: #aaa; }
    .state-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 10px; }
    .state-badge.playing { background: #2ed573; color: #000; }
    .state-badge.paused { background: #ffa502; color: #000; }
    .state-badge.stopped { background: #555; color: #ccc; }
    .log { background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #0f0; margin-top: 15px; }
    .log .entry { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Orchestra Conductor</h1>

    <div class="card">
      <h2>Playback Control</h2>
      <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
        <span id="stateBadge" class="state-badge stopped">STOPPED</span>
        <span id="positionText" class="time-display">0.0s</span>
      </div>
      <div class="controls">
        <button onclick="control('play')">Play</button>
        <button onclick="control('pause')" class="warning">Pause</button>
        <button onclick="control('stop')" class="secondary">Stop</button>
      </div>
      <div class="slider-container">
        <span>0s</span>
        <input type="range" id="seekSlider" min="0" max="10000" value="0" oninput="onSeekDrag(this.value)" onchange="control('seek', parseInt(this.value))">
        <span>10s</span>
      </div>
    </div>

    <div class="card">
      <h2>Score Upload (JSON)</h2>
      <textarea id="scoreInput" placeholder="Paste score JSON here..."></textarea>
      <div class="controls" style="margin-top:10px;">
        <button onclick="uploadScore()">Upload Score</button>
        <button onclick="loadExample()" style="background:#a55eea;color:#fff;">Load Example</button>
      </div>
    </div>

    <div class="card">
      <h2>Instrument Status</h2>
      <div id="statusGrid" class="status-grid">
        <div class="inst-card offline">
          <div class="inst-name">No Data</div>
          <div class="inst-status">Upload a score to see instruments</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Event Log</h2>
      <div id="log" class="log"></div>
    </div>
  </div>

  <script>
    const socket = io();
    let isPlaying = false;

    socket.on('playbackState', (state) => {
      isPlaying = state.isPlaying;
      updateUI(state);
      log(`State: ${state.action || 'sync'} | pos=${(state.position/1000).toFixed(1)}s`);
    });

    socket.on('scoreUpdated', (score) => {
      renderStatus(score.instruments);
      log(`Score uploaded: ${score.instruments.length} instruments`);
    });

    socket.on('status', (data) => {
      log(`ACK from Inst#${data.instrumentId}: ${JSON.stringify(data)}`);
      updateInstrumentCard(data.instrumentId, data);
    });

    socket.on('espStatus', (data) => {
      log(`ESP Status: ${JSON.stringify(data)}`);
    });

    async function control(action, position) {
      const payload = { action };
      if (position !== undefined) payload.position = position;
      try {
        await fetch('/api/control', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (action === 'seek') {
          document.getElementById('seekSlider').value = position;
        }
      } catch (e) {
        log(`Error: ${e.message}`);
      }
    }

    async function uploadScore() {
      const raw = document.getElementById('scoreInput').value;
      try {
        const score = JSON.parse(raw);
        const res = await fetch('/api/score', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(score),
        });
        const data = await res.json();
        if (data.success) {
          log(`Upload success: ${data.instrumentCount} instruments`);
        } else {
          log(`Upload failed: ${data.error}`);
        }
      } catch (e) {
        alert('Invalid JSON: ' + e.message);
      }
    }

    function loadExample() {
      const example = {
        "instruments": [
          { "id": 1, "name": "guitar", "pin": 2, "notes": [
            { "t": 0, "f": 262, "d": 200 }, { "t": 1000, "f": 330, "d": 200 },
            { "t": 2000, "f": 294, "d": 200 }, { "t": 3000, "f": 262, "d": 400 }
          ]},
          { "id": 2, "name": "bass", "pin": 16, "notes": [
            { "t": 0, "f": 196, "d": 200 }, { "t": 1000, "f": 196, "d": 200 },
            { "t": 2000, "f": 147, "d": 200 }, { "t": 3000, "f": 131, "d": 400 }
          ]},
          { "id": 3, "name": "oboe", "pin": 19, "notes": [
            { "t": 0, "f": 294, "d": 200 }, { "t": 1000, "f": 262, "d": 200 },
            { "t": 2000, "f": 220, "d": 200 }, { "t": 3000, "f": 247, "d": 400 }
          ]},
          { "id": 4, "name": "drums", "pin": 23, "notes": [
            { "t": 0, "f": 1, "d": 50 }, { "t": 500, "f": 1, "d": 50 },
            { "t": 1000, "f": 1, "d": 50 }, { "t": 1500, "f": 1, "d": 50 },
            { "t": 2000, "f": 1, "d": 50 }, { "t": 2500, "f": 1, "d": 50 },
            { "t": 3000, "f": 1, "d": 100 }
          ]}
        ]
      };
      document.getElementById('scoreInput').value = JSON.stringify(example, null, 2);
    }

    function onSeekDrag(val) {
      document.getElementById('positionText').textContent = (val/1000).toFixed(1) + 's';
    }

    function updateUI(state) {
      const badge = document.getElementById('stateBadge');
      badge.textContent = state.isPlaying ? 'PLAYING' : (state.position > 0 ? 'PAUSED' : 'STOPPED');
      badge.className = 'state-badge ' + (state.isPlaying ? 'playing' : (state.position > 0 ? 'paused' : 'stopped'));
      document.getElementById('seekSlider').value = state.position || 0;
      document.getElementById('positionText').textContent = ((state.position||0)/1000).toFixed(1) + 's';
    }

    function renderStatus(instruments) {
      const grid = document.getElementById('statusGrid');
      grid.innerHTML = '';
      instruments.forEach(inst => {
        const div = document.createElement('div');
        div.className = 'inst-card offline';
        div.id = `inst-${inst.id}`;
        div.innerHTML = `<div class="inst-name">${inst.name} (#${inst.id})</div><div class="inst-status">Pin ${inst.pin} | Waiting...</div>`;
        grid.appendChild(div);
      });
    }

    function updateInstrumentCard(id, data) {
      const card = document.getElementById(`inst-${id}`);
      if (!card) return;
      card.className = 'inst-card ' + (data.online ? 'online' : 'offline');
      const status = card.querySelector('.inst-status');
      status.textContent = `ACK: ${data.status || data.ack} | ${new Date().toLocaleTimeString()}`;
    }

    function log(msg) {
      const el = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.appendChild(entry);
      el.scrollTop = el.scrollHeight;
    }

    // Poll status every 2s as fallback
    setInterval(async () => {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        data.instruments.forEach(inst => updateInstrumentCard(inst.id, inst));
      } catch (e) {}
    }, 2000);
  </script>
</body>
</html>
